<title>The Wheel — Rules Checklist</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f17; color: #e8e8f0; min-height: 100vh; }

  /* ── TABS ── */
  .tab-bar { display: flex; background: #13131f; border-bottom: 1px solid #2a2a4a; position: sticky; top: 0; z-index: 100; }
  .tab-btn { flex: 1; padding: 14px 8px; border: none; background: none; color: #8888aa; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 0.5px; border-bottom: 3px solid transparent; transition: all 0.2s; }
  .tab-btn.active { color: #b8920b; border-bottom-color: #b8920b; background: #1a1a2e; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── HEADER ── */
  .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border-bottom: 1px solid #2a2a4a; padding: 18px 16px 14px; position: sticky; top: 49px; z-index: 99; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .header-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 3px; color: #b8920b; text-transform: uppercase; margin-bottom: 3px; }
  .header-title { font-size: 18px; font-weight: 800; color: #fff; }
  .header-pct { font-size: 24px; font-weight: 800; color: #b8920b; line-height: 1; }
  .header-sub { font-size: 11px; color: #8888aa; margin-top: 2px; text-align: right; }
  .progress-bar { background: #2a2a4a; border-radius: 4px; height: 5px; overflow: hidden; }
  .progress-fill { background: linear-gradient(90deg, #b8920b, #f0c040); height: 100%; border-radius: 4px; transition: width 0.3s ease; }

  /* Age bracket pills */
  .age-pills { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 10px; }
  .age-pill { padding: 3px 8px; border-radius: 20px; cursor: pointer; font-size: 10px; font-weight: 700; border: 1px solid transparent; transition: all 0.15s; }

  /* ── CONTROLS ── */
  .controls { padding: 12px 16px; background: #13131f; border-bottom: 1px solid #22223a; display: flex; flex-direction: column; gap: 8px; }
  .search-input { background: #1e1e30; border: 1px solid #2a2a4a; border-radius: 8px; padding: 9px 12px; color: #e8e8f0; font-size: 13px; width: 100%; outline: none; }
  .search-input::placeholder { color: #555577; }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-select { flex: 1; min-width: 80px; background: #1e1e30; border: 1px solid #2a2a4a; border-radius: 8px; padding: 7px 8px; color: #e8e8f0; font-size: 11px; outline: none; }
  .reset-btn { background: none; border: 1px solid #3a1a1a; border-radius: 8px; padding: 7px 14px; color: #e74c3c; font-size: 11px; cursor: pointer; font-weight: 600; white-space: nowrap; }
  .count-line { font-size: 11px; color: #555577; padding: 8px 16px 0; }

  /* ── RULES LIST ── */
  .rules-list { padding: 8px 16px 40px; }
  .group-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; margin-top: 16px; padding-bottom: 6px; border-bottom: 1px solid #2a2a4a; }
  .group-bar { width: 3px; height: 18px; border-radius: 2px; flex-shrink: 0; }
  .group-name { font-weight: 800; font-size: 14px; color: #fff; flex: 1; }
  .group-count { font-size: 11px; color: #8888aa; font-weight: 600; }
  .group-tag { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 700; letter-spacing: 0.5px; }

  .rule-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 11px; margin-bottom: 5px; border-radius: 10px; cursor: pointer; transition: all 0.15s; border: 1px solid #22223a; background: #16161f; }
  .rule-item.done { background: #0d1f0d; border-color: #1a4a1a; opacity: 0.72; }
  .rule-item.hardcoded { background: #1a1a10; border-color: #3a3a10; }
  .checkbox { width: 19px; height: 19px; border-radius: 5px; border: 2px solid #2a2a4a; background: transparent; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .checkbox.checked { background: #2ecc71; border-color: #2ecc71; }
  .checkbox.checked::after { content: '✓'; color: #000; font-size: 11px; font-weight: 900; }
  .rule-body { flex: 1; min-width: 0; }
  .rule-badges { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-bottom: 3px; }
  .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 700; }
  .badge-wheel { background: #1e1e30; color: #8888cc; }
  .badge-boost { background: #0d2a0d; color: #2ecc71; }
  .badge-suppress { background: #2a0d0d; color: #e74c3c; }
  .badge-hc { background: #2a2a00; color: #b8920b; }
  .badge-bt { background: #1a1a2e; color: #b8920b; }
  .rule-segment { font-size: 13px; color: #d0d0e8; line-height: 1.4; }
  .rule-segment.done { color: #667766; text-decoration: line-through; }
  .rule-note { font-size: 11px; color: #888830; margin-top: 3px; font-style: italic; }
  .rule-note.plain { color: #666688; }

  .empty-state { text-align: center; color: #555577; margin-top: 40px; font-size: 14px; padding: 20px; }
</style>

function loadChecked(key) {
  try { return JSON.parse(localStorage.getItem(key) || '{}'); } catch(e) { return {}; }
}
function saveChecked(key, data) {
  try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {}
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='body')||(i===1&&tab==='age')));
  document.getElementById('tab-body').classList.toggle('active', tab==='body');

// ══════════════════════════════════════════
// INIT DROPDOWNS
// ══════════════════════════════════════════
function initDropdowns() {
  // Body type filter
  const bts = [...new Set(BODY_RULES.map(r=>r.bt))];
  const bfbt = document.getElementById('body-fbt');
  bts.forEach(bt => { const o=document.createElement('option'); o.value=bt; o.textContent=bt; bfbt.appendChild(o); });

  const bwhs = [...new Set(BODY_RULES.map(r=>r.wh))].sort();
  const bfwh = document.getElementById('body-fwh');
  bwhs.forEach(wh => { const o=document.createElement('option'); o.value=wh; o.textContent=wh; bfwh.appendChild(o); });

  // Age filters
  const afage = document.getElementById('age-fage');
  AGE_BRACKETS.forEach(a => { const o=document.createElement('option'); o.value=a; o.textContent='Age '+a; afage.appendChild(o); });

  const awhs = [...new Set(AGE_RULES.map(r=>r.wh))].sort();
  const afwh = document.getElementById('age-fwh');
  awhs.forEach(wh => { const o=document.createElement('option'); o.value=wh; o.textContent=wh; afwh.appendChild(o); });
}

// ══════════════════════════════════════════
// BODY TYPE RENDER
// ══════════════════════════════════════════
function renderBody() {
  const search = document.getElementById('body-search').value.toLowerCase();
  const fbt = document.getElementById('body-fbt').value;
  const fwh = document.getElementById('body-fwh').value;
  const fact = document.getElementById('body-fact').value;
  const fst = document.getElementById('body-fst').value;

  const filtered = BODY_RULES.filter(r => {
    if(fbt && r.bt !== fbt) return false;
    if(fwh && r.wh !== fwh) return false;
    if(fact && r.action !== fact) return false;
    if(fst === 'done' && !bodyChecked[r.id]) return false;
    if(fst === 'todo' && bodyChecked[r.id]) return false;
    if(search) return r.bt.toLowerCase().includes(search)||r.wh.toLowerCase().includes(search)||r.seg.toLowerCase().includes(search);
    return true;
  });

  const total = BODY_RULES.length;
  const done = BODY_RULES.filter(r=>bodyChecked[r.id]).length;
  const pct = Math.round((done/total)*100);
  document.getElementById('body-pct').textContent = pct+'%';
  document.getElementById('body-sub').textContent = done+' / '+total+' rules';
  document.getElementById('body-bar').style.width = pct+'%';
  document.getElementById('body-count').textContent = 'Showing '+filtered.length+' of '+total+' rules';

  // Group by body type
  const groups = {};
  filtered.forEach(r => { if(!groups[r.bt]) groups[r.bt]=[]; groups[r.bt].push(r); });

  // Ordered by body type order
  const btOrder = ['Bulimic','Anorexic','Thin','Slim','Petite','Slim Thick','Average','Curvy','Upside Down Triangle','Mid Size','Mid Thick','Thick','Chubby','Thicker','Meatball','Thickest','Chunky','BBW','SSBBW','USSBBW'];
  const list = document.getElementById('body-list');
  list.innerHTML = '';

  if(Object.keys(groups).length === 0) {
    list.innerHTML = '<div class="empty-state">No rules match your filters.</div>';
    return;
  }

  btOrder.filter(bt=>groups[bt]).forEach(bt => {
    const rules = groups[bt];
    const group = getBodyGroup(bt);
    const color = BODY_GROUP_COLORS[group] || '#888';
    const gdone = rules.filter(r=>bodyChecked[r.id]).length;

    const hdr = document.createElement('div');
    hdr.className = 'group-header';
    hdr.innerHTML = `<div class="group-bar" style="background:${color}"></div><div class="group-name">${bt}</div><div class="group-count">${gdone}/${rules.length}</div><div class="group-tag" style="background:${color}22;color:${color}">${group}</div>`;
    list.appendChild(hdr);

    rules.forEach(r => {
      const done = !!bodyChecked[r.id];
      const isBoost = r.action==='BOOST';
      const item = document.createElement('div');
      item.className = 'rule-item' + (done?' done':'');
      item.onclick = () => toggleBody(r.id, item);
      item.innerHTML = `
        <div class="checkbox ${done?'checked':''}"></div>
        <div class="rule-body">
          <div class="rule-badges">
            <span class="badge badge-wheel">${r.wh}</span>
            <span class="badge ${isBoost?'badge-boost':'badge-suppress'}">${isBoost?'▲ BOOST':'▼ SUPPRESS'}</span>
          </div>
          <div class="rule-segment ${done?'done':''}">${r.seg}</div>
          ${r.note?`<div class="rule-note plain">${r.note}</div>`:''}
        </div>`;
      list.appendChild(item);
    });
  });
}

function toggleBody(id, item) {
  bodyChecked[id] = !bodyChecked[id];
  saveChecked(BODY_KEY, bodyChecked);
  renderBody();
}

function resetBody() {
  if(!confirm('Reset all body type rule progress?')) return;
  bodyChecked = {};
  saveChecked(BODY_KEY, {});
  renderBody();
}

// ══════════════════════════════════════════
// AGE RENDER
// ══════════════════════════════════════════
function renderAge() {
  const search = document.getElementById('age-search').value.toLowerCase();
  const fage = document.getElementById('age-fage').value;
  const fwh = document.getElementById('age-fwh').value;
  const fact = document.getElementById('age-fact').value;
  const fst = document.getElementById('age-fst').value;
  const fhc = document.getElementById('age-fhc').value;

  const filtered = AGE_RULES.filter(r => {
    if(fage && r.age !== fage) return false;
    if(fwh && r.wh !== fwh) return false;
    if(fact && r.action !== fact) return false;
    if(fst === 'done' && !ageChecked[r.id]) return false;
    if(fst === 'todo' && ageChecked[r.id]) return false;
    if(fhc === 'skip' && r.note && r.note.startsWith('⚠️')) return false;
    if(fhc === 'only' && !(r.note && r.note.startsWith('⚠️'))) return false;
    if(search) return r.age.includes(search)||r.wh.toLowerCase().includes(search)||r.seg.toLowerCase().includes(search);
    return true;
  });

  const total = AGE_RULES.length;
  const done = AGE_RULES.filter(r=>ageChecked[r.id]).length;
  const pct = Math.round((done/total)*100);
  document.getElementById('age-pct').textContent = pct+'%';
  document.getElementById('age-sub').textContent = done+' / '+total+' rules';
  document.getElementById('age-bar').style.width = pct+'%';
  document.getElementById('age-count').textContent = 'Showing '+filtered.length+' of '+total+' rules  ·  ⚠️ = already handled by hardcoded rules';

  // Age bracket pills
  const pillsEl = document.getElementById('age-pills');
  pillsEl.innerHTML = '';
  AGE_BRACKETS.forEach(age => {
    const ar = AGE_RULES.filter(r=>r.age===age);
    const ad = ar.filter(r=>ageChecked[r.id]).length;
    const ap = Math.round((ad/ar.length)*100);
    const color = AGE_COLORS[age];
    const active = fage === age;
    const pill = document.createElement('div');
    pill.className = 'age-pill';
    pill.style.cssText = `background:${active?color:color+'22'};color:${active?'#000':color};border-color:${color}44`;
    pill.textContent = age+' '+ap+'%';
    pill.onclick = () => {
      document.getElementById('age-fage').value = active ? '' : age;
      renderAge();
    };
    pillsEl.appendChild(pill);
  });

  // Group by age
  const groups = {};
  filtered.forEach(r => { if(!groups[r.age]) groups[r.age]=[]; groups[r.age].push(r); });

  const list = document.getElementById('age-list');
  list.innerHTML = '';

  if(Object.keys(groups).length === 0) {
    list.innerHTML = '<div class="empty-state">No rules match your filters.</div>';
    return;
  }

  AGE_BRACKETS.filter(a=>groups[a]).forEach(age => {
    const rules = groups[age];
    const color = AGE_COLORS[age];
    const gdone = rules.filter(r=>ageChecked[r.id]).length;
    const gpct = Math.round((gdone/rules.length)*100);

    const hdr = document.createElement('div');
    hdr.className = 'group-header';
    hdr.style.borderBottomColor = color+'44';
    hdr.innerHTML = `<div class="group-bar" style="background:${color}"></div><div class="group-name">Age ${age}</div><div class="group-count">${gdone}/${rules.length}</div><div class="group-tag" style="background:${color}22;color:${color}">${gpct}%</div>`;
    list.appendChild(hdr);

    rules.forEach(r => {
      const done = !!ageChecked[r.id];
      const isBoost = r.action==='BOOST';
      const isHC = r.note && r.note.startsWith('⚠️');
      const item = document.createElement('div');
      item.className = 'rule-item' + (done?' done':'') + (isHC?' hardcoded':'');
      item.onclick = () => { ageChecked[r.id]=!ageChecked[r.id]; saveChecked(AGE_KEY,ageChecked); renderAge(); };
      item.innerHTML = `
        <div class="checkbox ${done?'checked':''}"></div>
        <div class="rule-body">
          <div class="rule-badges">
            <span class="badge badge-wheel">${r.wh}</span>
            <span class="badge ${isBoost?'badge-boost':'badge-suppress'}">${isBoost?'▲ BOOST':'▼ SUPPRESS'}</span>
            ${isHC?'<span class="badge badge-hc">⚠️ HARDCODED</span>':''}
          </div>
          <div class="rule-segment ${done?'done':''}">${r.seg}</div>
          ${r.note?`<div class="rule-note ${isHC?'':'plain'}">${r.note}</div>`:''}
        </div>`;
      list.appendChild(item);
    });
  });
}

function resetAge() {
  if(!confirm('Reset all age rule progress?')) return;
  ageChecked = {};
  saveChecked(AGE_KEY, {});
  renderAge();
}

renderBody();
